name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

  workflow_dispatch:

permissions:
  contents: read
  pages: none

jobs:

  conformance:
    name: Conformance invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run conformance checks
        run: bash infra/conformance/check.sh
      - name: ShellCheck infra scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S error infra/pi-image/scripts/*.sh infra/docker/entrypoint.sh infra/conformance/check.sh


  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install + test
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio "python-can>=4.0" pyserial
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -d backend/tests ]; then pytest backend/tests -q; fi


  shared:
    name: Shared protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: frontend/shared
        run: npm install
      - working-directory: frontend/shared
        run: npx tsc --noEmit
      - working-directory: frontend/shared
        run: node --test --experimental-strip-types


  frontends:
    name: Frontends (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cockpit, copilot]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        working-directory: frontend/${{ matrix.app }}
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Build
        working-directory: frontend/${{ matrix.app }}
        run: |
          if [ -f package.json ]; then npm run build || npm run check; fi


  pi-image:
    name: Pi image validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate scripts
        run: |
          set -e
          for s in infra/pi-image/scripts/*.sh; do dash -n "$s"; done
          grep -q 'listen-only' infra/pi-image/scripts/can-up.sh
          grep -q 'wpa=2' infra/pi-image/scripts/ap-setup.sh
          ! grep -rniE 'arm64|aarch64' infra/pi-image