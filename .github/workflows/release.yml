name: Releases

on:
  push:
    branches:
      - develop
      - main
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  pi-image:
    name: Build artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build provisioning bundle
        run: |
          mkdir -p dist
          tar -czf dist/pi.tar.gz infra/pi-image

      - uses: actions/upload-artifact@v4
        with:
          name: pi-bundle
          path: dist/pi.tar.gz


  dev:
    name: DEV release
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [pi-image]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pi-bundle
          path: release

      - name: Delete old DEV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete DEV -y || true
          git push origin :refs/tags/DEV || true

      - name: Publish DEV
        uses: softprops/action-gh-release@v2
        with:
          tag_name: DEV
          prerelease: true
          name: Development Build
          files: release/pi.tar.gz


  rc:
    name: Release Candidate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [pi-image]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pi-bundle
          path: release

      - name: Delete old RC
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete RC -y || true
          git push origin :refs/tags/RC || true

      - name: Publish RC
        uses: softprops/action-gh-release@v2
        with:
          tag_name: RC
          prerelease: true
          name: Release Candidate
          files: release/pi.tar.gz


  stable:
    name: Stable release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [pi-image]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pi-bundle
          path: release

      - name: Delete RC
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete RC -y || true
          git push origin :refs/tags/RC || true

      - name: Publish stable
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release/pi.tar.gz